<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Paint Lab</title>
<style>
:root{
  --bg:#0f172a;
  --line:rgba(255,255,255,.12);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --accent:#38bdf8;
  --shadow:0 10px 28px rgba(0,0,0,.34);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#1e293b 0%,#0f172a 55%,#020617 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overscroll-behavior:none;}
body{display:flex;justify-content:center;align-items:stretch;}
button,input{font:inherit;}
button{outline:none;}
#app{width:min(100vw,780px);height:100dvh;display:grid;grid-template-rows:1fr auto;gap:8px;padding:8px;overflow:hidden;}
.stage{position:relative;min-height:0;display:flex;}
.paperShell{position:relative;flex:1;border-radius:26px;padding:8px;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;}
.paperFrame{position:absolute;inset:8px;border-radius:20px;background:#e5dcc9;box-shadow:inset 0 0 0 1px rgba(92,74,40,.16), inset 0 12px 24px rgba(255,255,255,.22), inset 0 -10px 18px rgba(160,133,77,.08);overflow:hidden;}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}
.bottomStack{display:grid;gap:8px;min-height:0;}
.toolbar,.paletteWrap{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(10px);}
.toolbar{padding:10px;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto;gap:8px;align-items:end;}
.control{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:8px 10px;display:grid;gap:5px;min-width:0;}
.control label{font-size:.8rem;color:var(--muted);font-weight:700;display:flex;justify-content:space-between;gap:8px;white-space:nowrap;}
.subValue{font-size:.76rem;color:var(--muted);min-height:1em;}
input[type="range"]{width:100%;appearance:none;background:transparent;margin:0;}
input[type="range"]::-webkit-slider-runnable-track{height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(255,255,255,.14),rgba(255,255,255,.28));}
input[type="range"]::-moz-range-track{height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(255,255,255,.14),rgba(255,255,255,.28));}
input[type="range"]::-webkit-slider-thumb{appearance:none;width:22px;height:22px;border-radius:50%;background:white;border:none;margin-top:-6px;box-shadow:0 4px 12px rgba(0,0,0,.28);}
input[type="range"]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:white;border:none;box-shadow:0 4px 12px rgba(0,0,0,.28);}
.actionRow{display:grid;grid-template-columns:1fr;gap:8px;align-self:stretch;}
button.actionBtn{appearance:none;border:none;background:linear-gradient(180deg,#38bdf8,#0284c7);color:white;font-weight:800;border-radius:18px;padding:11px 12px;font-size:.9rem;box-shadow:0 10px 20px rgba(2,132,199,.24);white-space:nowrap;}
button.actionBtn.secondary{background:linear-gradient(180deg,#475569,#334155);box-shadow:none;}
button.actionBtn:active{transform:translateY(1px) scale(.995);}
.paletteWrap{padding:10px;}
.palette{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;}
.swatchBtn{position:relative;border:none;border-radius:18px;padding:0;height:54px;background:transparent;box-shadow:none;}
.swatchFill{position:absolute;inset:0;border-radius:18px;border:2px solid rgba(255,255,255,.16);box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 8px 16px rgba(0,0,0,.18);overflow:hidden;}
.swatchFill::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 28%,rgba(255,255,255,.38),transparent 34%),radial-gradient(circle at 66% 74%,rgba(255,255,255,.14),transparent 40%);mix-blend-mode:screen;pointer-events:none;}
.swatchBtn.selected .swatchFill{border-color:white;box-shadow:0 0 0 3px rgba(56,189,248,.42), inset 0 1px 0 rgba(255,255,255,.28), 0 8px 16px rgba(0,0,0,.2);}
.swatchBtn:focus-visible .swatchFill{border-color:white;box-shadow:0 0 0 3px rgba(56,189,248,.42), inset 0 1px 0 rgba(255,255,255,.28), 0 8px 16px rgba(0,0,0,.2);}
@media (max-width:560px){
  #app{padding:8px;gap:8px;}
  .toolbar{grid-template-columns:1fr 1fr;}
  .actionRow{grid-column:1 / -1;grid-template-columns:1fr 1fr;}
  .swatchBtn{height:50px;}
}
</style>
</head>
<body>
<div id="app">
  <div class="stage">
    <div class="paperShell">
      <div class="paperFrame">
        <canvas id="paintCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="bottomStack">
    <div class="toolbar">
      <div class="control">
        <label>Brush size <span id="sizeValue">18</span></label>
        <input id="sizeSlider" type="range" min="6" max="44" step="1" value="18">
      </div>
      <div class="control">
        <label>Wetness <span id="wetValue">62%</span></label>
        <input id="wetSlider" type="range" min="10" max="100" step="1" value="62">
        <div class="subValue">Current brush: <span id="currentWetValue">62%</span></div>
      </div>
      <div class="actionRow">
        <button id="rinseBtn" class="actionBtn secondary" type="button">Rinse Brush</button>
        <button id="clearBtn" class="actionBtn" type="button">Fresh Paper</button>
      </div>
    </div>

    <div class="paletteWrap">
      <div id="palette" class="palette"></div>
    </div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('paintCanvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  const paletteEl = document.getElementById('palette');
  const sizeSlider = document.getElementById('sizeSlider');
  const wetSlider = document.getElementById('wetSlider');
  const sizeValue = document.getElementById('sizeValue');
  const wetValue = document.getElementById('wetValue');
  const currentWetValue = document.getElementById('currentWetValue');
  const clearBtn = document.getElementById('clearBtn');
  const rinseBtn = document.getElementById('rinseBtn');

  const paperRGB = [231, 222, 202];
  const pigments = [
    { name:'Lemon', swatch:'#f3d332', absorb:[0.02,0.16,2.25], opacity:1.10 },
    { name:'Cadmium', swatch:'#f26a2a', absorb:[0.04,0.72,2.20], opacity:1.25 },
    { name:'Crimson', swatch:'#ca2457', absorb:[0.10,2.00,0.86], opacity:1.20 },
    { name:'Cyan', swatch:'#21b7d7', absorb:[1.85,0.18,0.12], opacity:1.12 },
    { name:'Ultramarine', swatch:'#344bc7', absorb:[1.55,0.92,0.12], opacity:1.24 }
  ];

  let selected = 4;
  let carried = new Float32Array(pigments.length);
  let targetWetness = Number(wetSlider.value) / 100;
  let currentBrushWetness = targetWetness;
  let brushSize = Number(sizeSlider.value);
  let simW = 160;
  let simH = 220;
  let paintLayers = [];
  let wet = new Float32Array(simW * simH);
  let totalPaint = new Float32Array(simW * simH);
  let renderCanvas = document.createElement('canvas');
  let renderCtx = renderCanvas.getContext('2d', { alpha:false });
  let imageData = renderCtx.createImageData(simW, simH);
  let frame = 0;
  let drawing = false;
  let lastPoint = null;
  let pointerId = null;
  const deltaLayers = pigments.map(() => new Float32Array(simW * simH));
  const deltaWet = new Float32Array(simW * simH);

  function initGrid() {
    paintLayers = pigments.map(() => new Float32Array(simW * simH));
    wet = new Float32Array(simW * simH);
    totalPaint = new Float32Array(simW * simH);
    renderCanvas.width = simW;
    renderCanvas.height = simH;
    imageData = renderCtx.createImageData(simW, simH);
  }

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    draw();
  }

  function clamp(v, lo, hi) {
    return v < lo ? lo : v > hi ? hi : v;
  }

  function updateWetnessUI() {
    wetValue.textContent = Math.round(targetWetness * 100) + '%';
    currentWetValue.textContent = Math.round(currentBrushWetness * 100) + '%';
  }

  function rinseBrush() {
    carried.fill(0);
    currentBrushWetness = targetWetness;
    updateWetnessUI();
  }

  function setSelected(i) {
    selected = i;
    rinseBrush();
    [...paletteEl.children].forEach((el, idx) => el.classList.toggle('selected', idx === i));
  }

  function buildPalette() {
    paletteEl.innerHTML = '';
    pigments.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'swatchBtn';
      btn.setAttribute('aria-label', p.name);
      btn.title = p.name;
      btn.innerHTML = `<span class="swatchFill" style="background:${p.swatch}"></span>`;
      btn.addEventListener('click', () => setSelected(i));
      paletteEl.appendChild(btn);
    });
    setSelected(selected);
  }

  function pointerToSim(e) {
    const rect = canvas.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 0.999999) * simW;
    const y = clamp((e.clientY - rect.top) / rect.height, 0, 0.999999) * simH;
    return { x, y };
  }

  function mixToRGB(index) {
    const t = totalPaint[index];
    if (t < 0.0001) return paperRGB;
    let ar = 0, ag = 0, ab = 0;
    for (let p = 0; p < pigments.length; p++) {
      const amt = paintLayers[p][index];
      if (amt <= 0) continue;
      const w = amt / t;
      ar += pigments[p].absorb[0] * w * pigments[p].opacity;
      ag += pigments[p].absorb[1] * w * pigments[p].opacity;
      ab += pigments[p].absorb[2] * w * pigments[p].opacity;
    }
    const thickness = Math.min(2.1, t * 1.7);
    const cover = 1 - Math.exp(-t * 1.55);
    const rr = Math.exp(-ar * thickness);
    const gg = Math.exp(-ag * thickness);
    const bb = Math.exp(-ab * thickness);
    const pr = clamp(paperRGB[0] * rr, 0, 255);
    const pg = clamp(paperRGB[1] * gg, 0, 255);
    const pb = clamp(paperRGB[2] * bb, 0, 255);
    return [
      Math.round(paperRGB[0] * (1 - cover) + pr * cover),
      Math.round(paperRGB[1] * (1 - cover) + pg * cover),
      Math.round(paperRGB[2] * (1 - cover) + pb * cover)
    ];
  }

  function updateTotalsInArea(minX, minY, maxX, maxY) {
    for (let y = minY; y <= maxY; y++) {
      for (let x = minX; x <= maxX; x++) {
        const idx = y * simW + x;
        let sum = 0;
        for (let p = 0; p < pigments.length; p++) sum += paintLayers[p][idx];
        totalPaint[idx] = sum;
      }
    }
  }

  function consumeWetness(stepDistance, speed) {
    const dist = Math.max(0.28, stepDistance);
    const speedFactor = 0.88 + Math.min(2.2, speed) * 0.14;
    const sizeFactor = 0.78 + brushSize * 0.022;
    const dryness = 1 - currentBrushWetness;
    const drainScale = 0.46 + Math.pow(dryness, 2.7) * 5.2;
    const drain = dist * 0.00042 * sizeFactor * speedFactor * drainScale;
    currentBrushWetness = clamp(currentBrushWetness - drain, 0.01, 1);
    updateWetnessUI();
  }

  function stamp(x, y, dx, dy) {
    const activeWetness = currentBrushWetness;
    const moisture = clamp((activeWetness - 0.04) / 0.96, 0, 1);
    const fluidity = Math.pow(moisture, 0.58);
    const paintStrength = Math.pow(moisture, 2.25);
    const r = brushSize * 0.5 * (simW / 160);
    const minX = clamp(Math.floor(x - r - 2), 0, simW - 1);
    const maxX = clamp(Math.ceil(x + r + 2), 0, simW - 1);
    const minY = clamp(Math.floor(y - r - 2), 0, simH - 1);
    const maxY = clamp(Math.ceil(y + r + 2), 0, simH - 1);
    const speed = Math.min(2.5, Math.hypot(dx, dy));
    const sx = speed > 0.01 ? dx / speed : 0;
    const sy = speed > 0.01 ? dy / speed : 0;
    const smear = 0.012 + fluidity * 0.05;
    for (let yy = minY; yy <= maxY; yy++) {
      for (let xx = minX; xx <= maxX; xx++) {
        const ox = xx + 0.5 - x;
        const oy = yy + 0.5 - y;
        const d = Math.hypot(ox, oy) / r;
        if (d > 1) continue;
        const falloff = 1 - d * d;
        const idx = yy * simW + xx;
        const pickup = Math.min(0.055, (0.006 + fluidity * 0.026) * falloff * (0.35 + wet[idx] * 0.9));
        if (pickup > 0.0002 && totalPaint[idx] > 0.0001) {
          for (let p = 0; p < pigments.length; p++) {
            const here = paintLayers[p][idx];
            if (here <= 0.00001) continue;
            const take = Math.min(here, here * pickup);
            paintLayers[p][idx] -= take;
            carried[p] += take;
          }
        }
        let carryTotal = 0;
        for (let p = 0; p < pigments.length; p++) carryTotal += carried[p];
        const deposit = (0.006 + paintStrength * 0.115) * falloff;
        paintLayers[selected][idx] += deposit * (0.74 + fluidity * 0.18);
        if (carryTotal > 0.00001) {
          const carryDeposit = deposit * (0.18 + fluidity * 0.28);
          for (let p = 0; p < pigments.length; p++) {
            if (carried[p] <= 0.00001) continue;
            const portion = carryDeposit * (carried[p] / carryTotal);
            paintLayers[p][idx] += portion;
            carried[p] = Math.max(0, carried[p] - portion * 0.85);
          }
        }
        wet[idx] = Math.min(1, wet[idx] + (0.06 + fluidity * 0.82) * falloff);
        if (speed > 0.08) {
          const tx = clamp(Math.round(xx + sx), 0, simW - 1);
          const ty = clamp(Math.round(yy + sy), 0, simH - 1);
          const tidx = ty * simW + tx;
          const move = smear * falloff * wet[idx];
          for (let p = 0; p < pigments.length; p++) {
            const here = paintLayers[p][idx];
            if (here <= 0.00001) continue;
            const amount = Math.min(here, here * move);
            paintLayers[p][idx] -= amount;
            paintLayers[p][tidx] += amount;
          }
          const waterShift = wet[idx] * (0.035 + fluidity * 0.12) * falloff;
          wet[idx] = Math.max(0, wet[idx] - waterShift * 0.45);
          wet[tidx] = Math.min(1, wet[tidx] + waterShift);
        }
      }
    }
    updateTotalsInArea(minX, minY, maxX, maxY);
    consumeWetness(Math.max(0.35, Math.hypot(dx, dy)), speed);
  }

  function strokeLine(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.max(1, Math.hypot(dx, dy));
    const step = Math.max(0.45, brushSize * 0.11);
    const steps = Math.max(1, Math.ceil(dist / step));
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = a.x + dx * t;
      const y = a.y + dy * t;
      stamp(x, y, dx / steps, dy / steps);
    }
  }

  function beginPaint(e) {
    if (pointerId !== null) return;
    pointerId = e.pointerId;
    drawing = true;
    carried.fill(0);
    const pt = pointerToSim(e);
    lastPoint = pt;
    stamp(pt.x, pt.y, 0, 0);
    draw();
  }

  function movePaint(e) {
    if (!drawing || e.pointerId !== pointerId) return;
    const pt = pointerToSim(e);
    strokeLine(lastPoint, pt);
    lastPoint = pt;
    draw();
  }

  function endPaint(e) {
    if (e.pointerId !== pointerId) return;
    drawing = false;
    pointerId = null;
    lastPoint = null;
  }

  function diffuseOnce() {
    for (let i = 0; i < deltaWet.length; i++) deltaWet[i] = 0;
    for (let p = 0; p < pigments.length; p++) deltaLayers[p].fill(0);
    for (let y = 1; y < simH - 1; y++) {
      for (let x = 1; x < simW - 1; x++) {
        const idx = y * simW + x;
        const w = wet[idx];
        if (w < 0.02 || totalPaint[idx] < 0.0001) continue;
        const baseShare = 0.010 + w * 0.018;
        const neighbors = [idx - 1, idx + 1, idx - simW, idx + simW];
        for (let n = 0; n < 4; n++) {
          const ni = neighbors[n];
          const dw = Math.max(0, w - wet[ni] * 0.65);
          if (dw <= 0) continue;
          const share = Math.min(0.06, baseShare * dw);
          if (share <= 0.0002) continue;
          for (let p = 0; p < pigments.length; p++) {
            const amt = paintLayers[p][idx];
            if (amt <= 0.00001) continue;
            const move = Math.min(amt, amt * share);
            deltaLayers[p][idx] -= move;
            deltaLayers[p][ni] += move;
          }
          const waterMove = Math.min(w, share * 1.6);
          deltaWet[idx] -= waterMove;
          deltaWet[ni] += waterMove;
        }
      }
    }
    for (let i = 0; i < wet.length; i++) {
      wet[i] = clamp(wet[i] + deltaWet[i], 0, 1) * 0.9915;
    }
    for (let p = 0; p < pigments.length; p++) {
      const layer = paintLayers[p];
      const delta = deltaLayers[p];
      for (let i = 0; i < layer.length; i++) layer[i] = Math.max(0, layer[i] + delta[i]);
    }
    for (let i = 0; i < totalPaint.length; i++) {
      let sum = 0;
      for (let p = 0; p < pigments.length; p++) sum += paintLayers[p][i];
      totalPaint[i] = sum * 0.9993;
      for (let p = 0; p < pigments.length; p++) paintLayers[p][i] *= 0.9993;
    }
  }

  function draw() {
    const data = imageData.data;
    for (let i = 0, px = 0; i < totalPaint.length; i++, px += 4) {
      const rgb = mixToRGB(i);
      data[px] = rgb[0];
      data[px + 1] = rgb[1];
      data[px + 2] = rgb[2];
      data[px + 3] = 255;
    }
    renderCtx.putImageData(imageData, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(renderCanvas, 0, 0, canvas.width, canvas.height);
  }

  function animate() {
    frame++;
    if ((frame & 1) === 0) diffuseOnce();
    draw();
    requestAnimationFrame(animate);
  }

  function clearPaper() {
    for (let p = 0; p < pigments.length; p++) paintLayers[p].fill(0);
    wet.fill(0);
    totalPaint.fill(0);
    rinseBrush();
    draw();
  }

  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    beginPaint(e);
  });
  canvas.addEventListener('pointermove', movePaint);
  canvas.addEventListener('pointerup', endPaint);
  canvas.addEventListener('pointercancel', endPaint);
  canvas.addEventListener('pointerleave', e => {
    if (drawing && e.pointerId === pointerId) movePaint(e);
  });

  sizeSlider.addEventListener('input', () => {
    brushSize = Number(sizeSlider.value);
    sizeValue.textContent = String(brushSize);
  });

  wetSlider.addEventListener('input', () => {
    targetWetness = Number(wetSlider.value) / 100;
    currentBrushWetness = targetWetness;
    updateWetnessUI();
  });

  clearBtn.addEventListener('click', clearPaper);
  rinseBtn.addEventListener('click', rinseBrush);
  window.addEventListener('resize', resizeCanvas, { passive:true });

  initGrid();
  buildPalette();
  sizeValue.textContent = String(brushSize);
  updateWetnessUI();
  resizeCanvas();
  clearPaper();
  animate();
})();
</script>
</body>
</html>
